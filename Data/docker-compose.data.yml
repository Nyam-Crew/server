
services:
  database:
    image: postgres:17
    container_name: everydayDB
    ports:
      - "5432:5432"
#    env_file:
#      - ./.env
    environment:
      POSTGRES_DB: everyday
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
    volumes:
      - ./volumes/postgresql-data:/var/lib/postgresql/data
#    networks:
#      - nyam_server
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: everydayMongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 1234
      MONGO_INITDB_DATABASE: nyamnyammongo     # 초기 생성 DB (선택)
    volumes:
      - ./volumes/mongo-data:/data/db
    restart: unless-stopped
