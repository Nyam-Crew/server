
services:
  database:
    image: postgres:17
    container_name: everydayDB
    ports:
      - "5432:5432"
#    env_file:
#      - ./.env
    environment:
      POSTGRES_DB: everyday
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1234
    volumes:
      - ./volumes/postgresql-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - nyam_server
    restart: unless-stopped

