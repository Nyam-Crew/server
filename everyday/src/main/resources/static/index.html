<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>лЎњк·ёмќё</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f7f8fa; }
        .container {
            width: 350px; margin: 60px auto; background: #fff; padding: 32px 28px;
            border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 26px;}
        label {
            display: block;
            margin: 18px 0 7px 0;
            color: #444;
            text-align: left;         /* м™јмЄЅ м •л ¬ */
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            box-sizing: border-box;   /* widthк°Ђ padding, border нЏ¬н•Ё */
            padding: 9px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            margin-bottom: 2px;
        }
        button {
            width: 100%; background: #4078c0; color: white; font-weight: bold;
            border: none; border-radius: 6px; padding: 11px; margin-top: 24px;
            font-size: 16px; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #285690; }
        .signup-btn {
            width: 100%; background: #eee; color: #285690; font-weight: bold;
            border: none; border-radius: 6px; padding: 11px; margin-top: 12px;
            font-size: 16px; cursor: pointer; transition: background 0.2s;
        }
        .signup-btn:hover { background: #e0e8f5; }
        .msg { margin-top: 18px; text-align: center; font-weight: bold;}
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
<div class="container">
    <h2>лЎњк·ёмќё</h2>

    <!-- м†Њм…њ лЎњк·ёмќё лІ„нЉјл“¤ -->
    <button type="button" onclick="location.href='/oauth2/authorization/google'">Google лЎњк·ёмќё</button>
    <button type="button" onclick="location.href='/oauth2/authorization/kakao'">Kakao лЎњк·ёмќё</button>

    <div class="msg" id="msg"></div>
</div>
<script>

    //sessionStorage м°Ѕ л‹«мњјл©ґ лЄЁл“  лЌ°мќґн„° м—†м–ґм§ђ
    //localStorage м§Ѓм ‘ м‚­м њн•ґм•ј м—†м–ґм§ђ
    if (!sessionStorage.getItem('logoutOnce')) {
        fetch("/api/auth/logout", {
            method: "POST",
            credentials: "include" // мї н‚¤ к°™мќґ м „м†Ў
        })
        .then(res => {
            if(res.ok) {
                // localStorageлЏ„ м‹№ м •л¦¬!
                localStorage.removeItem("accessToken");
                localStorage.removeItem("refreshToken");
                localStorage.removeItem("username");
                localStorage.removeItem("user_id");
                sessionStorage.setItem('logoutOnce', 'true'); // мќґм њ л‹¤м‹њ м•€ н•Ё!
                // н™€мњјлЎњ мќґлЏ™ л“±
                location.href = "index.html";
            } else {
                alert("лЎњк·ём•„м›ѓ м‹¤нЊЁ");
            }
        });
    }




</script>
</body>
</html>
