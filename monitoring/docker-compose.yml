networks:
  k6-network:
    driver: bridge # 서비스 간 통신을 위한 네트워크 정의

services:
  influxdb:
    image: influxdb:1.8
    networks:
      - k6-network
    ports:
      - '8086:8086'
    environment:
      - INFLUXDB_DB=k6
    volumes:
      - influxdb-data:/var/lib/influxdb

  grafana:
    image: grafana/grafana:latest
    networks:
      - k6-network
    ports:
      - '3000:3000'
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true # 익명 접속 허용 (테스트 환경용)
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb

  k6:
    image: grafana/k6:latest
    ports:
      - "6565:6565"
    networks:
      - k6-network
    command: run -o influxdb scripts/ranking-write-test.js
    environment:
      - K6_INFLUXDB_ADDR=http://influxdb:8086
      - K6_INFLUXDB_DATABASE=k6
    volumes:
      - ./scripts:/scripts
    working_dir: /scripts # k6 실행 시 기본 작업 디렉토리
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - influxdb


volumes:
  influxdb-data:
  grafana_data: # Grafana 데이터 영속성을 위한 볼륨